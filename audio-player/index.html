<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Custom Audio Player</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <div id="player">
    <div class="card">

      <div class="viz-bar" id="vizBar"></div>

      <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileIn').click()">
        <input type="file" id="fileIn" accept="audio/*" />
        <div class="upload-text">Click to load an audio file &nbsp;(mp3, wav, ogg, etc.)</div>
        <div class="demo-notice">Or use the demo tone below — no file needed</div>
      </div>

      <div class="track-info">
        <div style="display:flex; align-items:center; gap:6px;">
          <span class="status-dot" id="statusDot"></span>
          <span class="track-title" id="trackTitle">No file loaded</span>
        </div>
        <div class="track-sub" id="trackSub">Load a file or try the demo tone</div>
      </div>

      <div class="progress-wrap" id="progressWrap">
        <div class="progress-fill" id="progressFill"></div>
        <div class="progress-thumb" id="progressThumb"></div>
      </div>
      <div class="time-row">
        <span id="timeCur">0:00</span>
        <span id="timeDur">0:00</span>
      </div>

      <div class="controls">
        <button class="ctrl-btn sm" id="btnLoop" title="Toggle loop (L)">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="17 1 21 5 17 9"/>
            <path d="M3 11V9a4 4 0 0 1 4-4h14"/>
            <polyline points="7 23 3 19 7 15"/>
            <path d="M21 13v2a4 4 0 0 1-4 4H3"/>
          </svg>
        </button>

        <button class="ctrl-btn md" id="btnSkipBack" title="Skip back 10s (←)">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="19 20 9 12 19 4 19 20"/>
            <line x1="5" y1="19" x2="5" y2="5"/>
          </svg>
        </button>

        <button class="ctrl-btn lg" id="btnPlay" title="Play/Pause (Space)">
          <svg id="iconPlay" width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
            <polygon points="5 3 19 12 5 21 5 3"/>
          </svg>
          <svg id="iconPause" width="22" height="22" viewBox="0 0 24 24" fill="currentColor" style="display:none">
            <rect x="6" y="4" width="4" height="16"/>
            <rect x="14" y="4" width="4" height="16"/>
          </svg>
        </button>

        <button class="ctrl-btn md" id="btnSkipFwd" title="Skip forward 10s (→)">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="5 4 15 12 5 20 5 4"/>
            <line x1="19" y1="5" x2="19" y2="19"/>
          </svg>
        </button>

        <button class="ctrl-btn sm" id="btnMute" title="Mute/Unmute (M)">
          <svg id="iconVol" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
            <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
            <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
          </svg>
          <svg id="iconMute" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
            <line x1="23" y1="9" x2="17" y2="15"/>
            <line x1="17" y1="9" x2="23" y2="15"/>
          </svg>
        </button>

        <button class="ctrl-btn sm demo-btn" id="btnDemo" title="Play demo tone">Demo</button>
      </div>

      <div class="sliders-grid">
        <div class="slider-row">
          <div class="slider-label">
            <span>Volume</span>
            <span id="volVal">80%</span>
          </div>
          <input type="range" id="volSlider" min="0" max="100" value="80" step="1" />
        </div>
        <div class="slider-row">
          <div class="slider-label">
            <span>Speed</span>
            <span id="speedVal">1.0×</span>
          </div>
          <input type="range" id="speedSlider" min="0.5" max="2.0" value="1.0" step="0.1" />
        </div>
      </div>

      <div class="kbd-hint">
        <div class="kbd-tag"><kbd>Space</kbd> play/pause</div>
        <div class="kbd-tag"><kbd>M</kbd> mute</div>
        <div class="kbd-tag"><kbd>L</kbd> loop</div>
        <div class="kbd-tag"><kbd>←</kbd><kbd>→</kbd> skip 10s</div>
        <div class="kbd-tag"><kbd>↑</kbd><kbd>↓</kbd> volume</div>
      </div>

    </div>
  </div>

  <script src="js/player.js"></script>
</body>
</html>
